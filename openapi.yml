openapi: 3.0.3

info:
  title: API de integração Postogestor e Autoguard - Posto Mahle
  version: "1.0.1"
  description: |
    REST API para integração **Postogestor e Autoguard** - Posto Mahle Campina Grande - PR.

    Todas as transações são autenticadas utilizando **Bearer Token** (Gerado via Laravel Sanctum/Passport).

    ### Regras de Negócio:
    *   **Hash do Ticket:** É o identificador único (32 dígitos) gerado no Autoguard. Deve ser tratado em **UPPERCASE**.
    *   **Formato do Hash:** `MD5{11}|PLACA{7}|YYYY{4}|MM{2}|DD{2}|II{2}|MM{2}|SS{2}`.
    *   **Timestamps:** Seguem o padrão `YYYYMMDDHHIISS`.
    *   **Liberação de Saída:** O ticket é considerado liberado apenas quando `valor_pago` for **diferente de null** (aceita-se `0.00`).

servers:
  - url: https://172.20.25.46
    description: Servidor de Produção Autoguard (a ser ativado)

security:
  - BearerAuth: []

paths:
  /tickets:
    post:
      summary: Registra um novo ticket
      description: Realiza a abertura de um ticket no sistema Autoguard.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - totem
              properties:
                placa:
                  type: string
                  maxLength: 7
                  nullable: true
                  description: "Placa do veículo (case-insensitive). Se nulo, registra como 'UNKNOWN'."
                  example: "ABC1234"
                totem:
                  type: string
                  maxLength: 32
                  description: "Identificação do terminal emissor."
                  example: "POSTOGESTOR-01"
      responses:
        "201":
          description: Ticket criado com sucesso.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                    example: "610E80706AAABC123420260311131059"
        "401":
          description: Não autorizado (Token ausente ou inválido).
        "500":
          description: Erro interno no servidor.

  /tickets/{hash}:
    parameters:
      - name: hash
        in: path
        required: true
        description: Hash identificador de 32 caracteres do ticket.
        schema:
          type: string
          maxLength: 32

    get:
      summary: Consulta dados do ticket
      description: Retorna o status atual do ticket, incluindo placa e valor de pagamento.
      responses:
        "200":
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  hash:
                    type: string
                  placa:
                    type: string
                  valor_pago:
                    type: number
                    format: double
                    nullable: true
                    description: |
                      Valor total pago (decimal 8,2).
                      Inicia como `null`. O ticket só é liberado se este campo for != null.
                    example: 15.50
        "404":
          description: Ticket não encontrado.

    patch:
      summary: Atualiza placa ou registra pagamento
      description: |
        Endpoint polivalente para manutenção do ticket:
        1. Envie `placa` para corrigir a identificação do veículo.
        2. Envie `valor_pago` para confirmar o pagamento e liberar a saída.
        **Nota:** Enviar `valor_pago: 0` libera a saída (cortesia).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                placa:
                  type: string
                  maxLength: 7
                  example: "XYZ9876"
                valor_pago:
                  type: number
                  format: double
                  minimum: 0
                  example: 12.00
      responses:
        "200":
          description: Ticket atualizado com sucesso.
        "400":
          description: Payload inválido ou erro de validação.
        "404":
          description: Ticket não encontrado.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Insira o API Token gerado no sistema (sem o prefixo 'Bearer')."
